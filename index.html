<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>前额叶实验室 - 精调版</title>
    <style>
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        #root { height: 100vh; width: 100vw; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .difficulty-hard { border: 2px solid #ef4444 !important; position: relative; }
        .difficulty-hard::after { content: 'HARD'; position: absolute; top: -8px; right: 10px; background: #ef4444; color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 800; }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slide-up 0.4s ease-out; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const render = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = '';
                        const iconEl = document.createElement('i');
                        iconEl.setAttribute('data-lucide', name);
                        iconEl.className = className;
                        iconRef.current.appendChild(iconEl);
                        window.lucide.createIcons({ attrs: { class: className }, nameAttr: 'data-lucide', icons: window.lucide.icons });
                    }
                };
                render();
                const timer = setInterval(() => { if (window.lucide) { render(); clearInterval(timer); } }, 500);
                return () => clearInterval(timer);
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [view, setView] = useState('home'); 
            const [difficulty, setDifficulty] = useState('normal'); 
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            const [lastScore, setLastScore] = useState(0);
            
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('brain_train_pro_data');
                return saved ? JSON.parse(saved) : { totalSessions: 0, bestScore: 0, isHardUnlocked: false };
            });

            const updateHistory = (newScore) => {
                const unlockedNow = history.isHardUnlocked || newScore >= 500;
                const newHistory = {
                    totalSessions: history.totalSessions + 1,
                    bestScore: Math.max(history.bestScore, newScore),
                    isHardUnlocked: unlockedNow
                };
                setHistory(newHistory);
                localStorage.setItem('brain_train_pro_data', JSON.stringify(newHistory));
            };

            const COLORS = [{ name: '红色', val: '#EF4444' }, { name: '蓝色', val: '#3B82F6' }, { name: '绿色', val: '#10B981' }, { name: '黄色', val: '#F59E0B' }, { name: '紫色', val: '#8B5CF6' }, { name: '橙色', val: '#F97316' }];
            const [stroop, setStroop] = useState({ text: '', color: '', opts: [] });
            const [schulte, setSchulte] = useState({ grid: [], next: 1 });
            const [nback, setNback] = useState({ current: null, isMatch: false });
            const [setGame, setSetGame] = useState({ cards: [], selected: [] });
            const nbackSeq = useRef([]);

            // --- 游戏生成逻辑 ---
            const nextStroop = () => {
                const pool = COLORS.slice(0, difficulty === 'hard' ? 6 : 4);
                const t = Math.floor(Math.random()*pool.length);
                let c; do { c = Math.floor(Math.random()*pool.length); } while(c === t);
                setStroop({ text: pool[t].name, color: pool[c].val, opts: [...pool].sort(()=>Math.random()-0.5) });
            };

            const startSchulte = () => {
                const nums = Array.from({length: 25}, (_, i) => i+1).sort(()=>Math.random()-0.5);
                setSchulte({ grid: nums, next: 1 });
                setView('schulte'); setScore(0); setTimeLeft(60);
            };

            const nextNback = () => {
                const newNum = Math.floor(Math.random() * 9) + 1;
                nbackSeq.current.push(newNum);
                const seq = nbackSeq.current;
                // 强制逻辑：只有 2-back
                const match = seq.length > 2 && seq[seq.length-1] === seq[seq.length-3];
                setNback({ current: newNum, isMatch: match });
            };

            const genSetCards = () => {
                const shapes = ['circle', 'square', 'triangle'];
                const colors = ['#EF4444', '#3B82F6', '#10B981'];
                const newCards = Array.from({length: 9}, (_, i) => ({
                    id: i,
                    shape: shapes[Math.floor(Math.random()*3)],
                    color: colors[Math.floor(Math.random()*3)],
                    fill: difficulty === 'hard' ? Math.random() > 0.5 : true
                }));
                setSetGame({ cards: newCards, selected: [] });
            };

            useEffect(() => {
                let timer;
                if (timeLeft > 0 && ['stroop', 'schulte', 'nback', 'setgame'].includes(view)) {
                    timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0 && view !== 'home' && view !== 'result') {
                    setLastScore(score);
                    updateHistory(score);
                    setView('result');
                }
                return () => clearInterval(timer);
            }, [timeLeft, view, score]);

            return (
                <div className="h-full flex flex-col bg-slate-50 text-slate-900 select-none">
                    {view !== 'home' && (
                        <div className="h-14 px-4 flex justify-between items-center bg-white border-b shrink-0 z-30">
                            <button onClick={() => setView('home')} className="p-2 text-slate-400"><Icon name="arrow-left" /></button>
                            <div className="flex gap-4">
                                <div className="text-right font-mono text-lg font-bold">{timeLeft}s</div>
                                <div className="text-right font-mono text-lg font-bold text-indigo-600">{score}</div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 overflow-hidden relative">
                        {view === 'home' && (
                            <div className="p-6 h-full flex flex-col max-w-md mx-auto animate-slide-up no-scrollbar overflow-y-auto">
                                <div className="bg-indigo-600 p-5 rounded-3xl text-white shadow-xl mb-6">
                                    <div className="flex justify-between items-end">
                                        <div><div className="text-[10px] opacity-70 font-bold uppercase tracking-widest">最高分</div><div className="text-4xl font-black">{history.bestScore}</div></div>
                                        <div className="text-right text-[10px] font-bold">{history.isHardUnlocked ? "🔓 进阶已解锁" : "🔒 500分解锁"}</div>
                                    </div>
                                </div>

                                <div className="flex bg-slate-200 p-1 rounded-2xl mb-6">
                                    <button onClick={() => setDifficulty('normal')} className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all ${difficulty === 'normal' ? 'bg-white shadow-md text-indigo-600' : 'text-slate-500'}`}>基础训练</button>
                                    <button onClick={() => history.isHardUnlocked ? setDifficulty('hard') : alert("满500分解锁进阶模式！")} className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1 ${difficulty === 'hard' ? 'bg-red-500 text-white shadow-md' : 'text-slate-400'}`}>
                                        {!history.isHardUnlocked && <Icon name="lock" className="w-3 h-3" />}进阶挑战
                                    </button>
                                </div>

                                <div className="grid gap-3">
                                    <button onClick={() => startSchulte()} className="flex items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-95">
                                        <div className="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center mr-4"><Icon name="grid-3x3" /></div>
                                        <div className="text-left font-bold text-sm">舒尔特方格<div className="text-[10px] text-slate-400 font-normal">{difficulty === 'hard' ? '不显示已选（盲点模式）' : '基础 5x5'}</div></div>
                                    </button>
                                    <button onClick={() => { setView('stroop'); setScore(0); setTimeLeft(30); nextStroop(); }} className="flex items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-95">
                                        <div className="w-10 h-10 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center mr-4"><Icon name="zap" /></div>
                                        <div className="text-left font-bold text-sm">Stroop 干扰<div className="text-[10px] text-slate-400 font-normal">{difficulty === 'hard' ? '文字选项（加工冲突）' : '颜色选项（直觉反应）'}</div></div>
                                    </button>
                                    <button onClick={() => { setView('nback'); setScore(0); setTimeLeft(60); nbackSeq.current=[]; nextNback(); }} className="flex items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-95">
                                        <div className="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center mr-4"><Icon name="refresh-cw" /></div>
                                        <div className="text-left font-bold text-sm">N-Back 记忆<div className="text-[10px] text-slate-400 font-normal">{difficulty === 'hard' ? '仅 2-Back 计分' : '基础 2-Back'}</div></div>
                                    </button>
                                    <button onClick={() => { setView('setgame'); setScore(0); setTimeLeft(60); genSetCards(); }} className="flex items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-95">
                                        <div className="w-10 h-10 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center mr-4"><Icon name="layers" /></div>
                                        <div className="text-left font-bold text-sm">SET 逻辑匹配<div className="text-[10px] text-slate-400 font-normal">多维逻辑处理</div></div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Stroop - 基础改颜色按钮，进阶改文字按钮 */}
                        {view === 'stroop' && (
                            <div className="h-full flex flex-col items-center justify-center p-6 space-y-12">
                                <div className="text-7xl font-black" style={{color: stroop.color}}>{stroop.text}</div>
                                <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
                                    {stroop.opts.map(o => (
                                        <button key={o.val} onClick={() => {
                                            if(o.val === stroop.color) { setScore(s => s + (difficulty === 'hard' ? 30 : 20)); nextStroop(); }
                                            else { setTimeLeft(t=>Math.max(0, t-3)); }
                                        }} className="py-5 bg-white rounded-2xl font-bold shadow-sm border border-slate-100 active:bg-indigo-50 flex items-center justify-center">
                                            {difficulty === 'hard' ? o.name : <div className="w-8 h-8 rounded-full" style={{backgroundColor: o.val}}></div>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'schulte' && (
                            <div className="h-full flex flex-col items-center justify-center p-4">
                                <div className="text-4xl font-black text-indigo-600 mb-6">{schulte.next}</div>
                                <div className="grid grid-cols-5 gap-1.5 w-full max-w-sm aspect-square">
                                    {schulte.grid.map(n => {
                                        const isDone = n < schulte.next;
                                        // 核心逻辑：进阶版不显示填充颜色
                                        const showDoneStyle = isDone && difficulty !== 'hard';
                                        return (
                                            <button key={n} onClick={() => {
                                                if(n === schulte.next) {
                                                    if(n === 25) { setLastScore(score + 250); updateHistory(score + 250); setView('result'); }
                                                    else { setSchulte(p => ({...p, next: p.next+1})); setScore(s=>s+10); }
                                                }
                                            }} className={`flex items-center justify-center font-bold text-lg rounded-lg transition-all ${showDoneStyle ? 'bg-indigo-600 text-white opacity-20' : 'bg-white shadow-sm border border-slate-100'}`}>
                                                {n}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'nback' && (
                            <div className="h-full flex flex-col items-center justify-center p-6 text-center">
                                <div className="text-xs font-bold text-indigo-500 mb-2">2-Back 模式</div>
                                <div className="w-28 h-28 bg-white rounded-[2rem] shadow-xl border-2 border-indigo-100 flex items-center justify-center text-5xl font-black text-indigo-600 mb-12">{nback.current}</div>
                                <div className="flex gap-4 w-full max-w-xs">
                                    <button onClick={() => {
                                        if(nback.isMatch) setScore(s => s + (difficulty === 'hard' ? 70 : 50));
                                        else setTimeLeft(t=>Math.max(0, t-4));
                                        nextNback();
                                    }} className="flex-1 py-6 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">匹配</button>
                                    <button onClick={() => {
                                        // 进阶版：选对“不同”不给分 (只有匹配给分)
                                        if(!nback.isMatch && difficulty !== 'hard') setScore(s => s + 10);
                                        if(nback.isMatch) setTimeLeft(t=>Math.max(0, t-4));
                                        nextNback();
                                    }} className="flex-1 py-6 bg-slate-200 text-slate-600 rounded-2xl font-black">不同</button>
                                </div>
                            </div>
                        )}

                        {/* SET 游戏逻辑保持现状 */}
                        {view === 'setgame' && (
                            <div className="h-full flex flex-col p-6 items-center">
                                <div className="text-xs text-slate-400 font-bold mb-6 tracking-widest text-center uppercase">SET 逻辑匹配</div>
                                <div className="grid grid-cols-3 gap-2 w-full max-w-sm">
                                    {setGame.cards.map(card => (
                                        <button key={card.id} onClick={() => {
                                                const newSel = setGame.selected.includes(card.id) ? setGame.selected.filter(id => id !== card.id) : [...setGame.selected, card.id];
                                                if(newSel.length === 3) {
                                                    const [c1, c2, c3] = newSel.map(id => setGame.cards.find(c => c.id === id));
                                                    if((c1.color===c2.color && c2.color===c3.color) || (c1.shape===c2.shape && c2.shape===c3.shape)) { setScore(s => s + 70); genSetCards(); }
                                                    else setSetGame(p => ({...p, selected: []}));
                                                } else setSetGame(p => ({...p, selected: newSel}));
                                            }}
                                            className={`aspect-square rounded-xl flex items-center justify-center transition-all ${setGame.selected.includes(card.id) ? 'bg-indigo-50 border-2 border-indigo-500' : 'bg-white border border-slate-100'}`}>
                                            <div style={{color: card.color}} className={card.fill ? 'opacity-100' : 'opacity-30'}><Icon name={card.shape} className="w-10 h-10" /></div>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={genSetCards} className="mt-8 text-slate-300 font-bold text-[10px] uppercase tracking-widest">刷新</button>
                            </div>
                        )}

                        {view === 'result' && (
                            <div className="h-full flex flex-col items-center justify-center p-8 text-center bg-white animate-slide-up">
                                <div className="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mb-4"><Icon name="trophy" className="text-amber-600" /></div>
                                <h2 className="text-xl font-black">训练结束</h2>
                                <div className="my-6"><div className="text-5xl font-black text-indigo-600">{lastScore}</div><div className="text-[10px] text-slate-400 font-bold mt-2 uppercase tracking-widest">Points</div></div>
                                {lastScore >= 500 && !history.isHardUnlocked && (<div className="mb-6 p-3 bg-green-50 text-green-700 text-xs font-bold rounded-xl animate-bounce">🎉 进阶模式已解锁！</div>)}
                                <button onClick={() => setView('home')} className="w-full max-w-xs py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">回到大厅</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
