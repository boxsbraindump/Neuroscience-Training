<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>前额叶实验室 - 脑科学训练中心</title>
    <style>
        body { background-color: #f9fafb; font-family: system-ui, -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        #root { height: 100vh; width: 100vw; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 稳健的图标组件 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                const render = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = ''; // 清空旧内容
                        const iconEl = document.createElement('i');
                        iconEl.setAttribute('data-lucide', name);
                        iconEl.className = className;
                        iconRef.current.appendChild(iconEl);
                        window.lucide.createIcons({
                            attrs: { class: className },
                            nameAttr: 'data-lucide',
                            icons: window.lucide.icons
                        });
                    }
                };

                render();
                // 监听全局 lucide 加载
                const timer = setInterval(() => {
                    if (window.lucide) {
                        render();
                        clearInterval(timer);
                    }
                }, 500);
                return () => clearInterval(timer);
            }, [name, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [view, setView] = useState('home'); 
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            const [lastScore, setLastScore] = useState(0);

            // --- 游戏逻辑状态 ---
            const [stroop, setStroop] = useState({ text: '', color: '', opts: [] });
            const [schulte, setSchulte] = useState({ grid: [], next: 1 });
            const [nback, setNback] = useState({ sequence: [], current: null, isMatch: false });
            const [setGame, setSetGame] = useState({ cards: [], selected: [] });
            const nbackSeq = useRef([]);

            // --- 1. Stroop ---
            const COLORS = [
                { name: '红色', val: '#EF4444' }, { name: '蓝色', val: '#3B82F6' },
                { name: '绿色', val: '#10B981' }, { name: '黄色', val: '#F59E0B' },
                { name: '紫色', val: '#8B5CF6' }
            ];
            const nextStroop = () => {
                const t = Math.floor(Math.random()*COLORS.length);
                let c; do { c = Math.floor(Math.random()*COLORS.length); } while(c === t);
                setStroop({ text: COLORS[t].name, color: COLORS[c].val, opts: [...COLORS].sort(()=>Math.random()-0.5) });
            };

            // --- 2. Schulte ---
            const startSchulte = () => {
                const nums = Array.from({length: 25}, (_, i) => i+1).sort(()=>Math.random()-0.5);
                setSchulte({ grid: nums, next: 1 });
                setView('schulte'); setScore(0); setTimeLeft(60);
            };

            // --- 3. N-Back ---
            const nextNback = () => {
                const newNum = Math.floor(Math.random() * 9) + 1;
                nbackSeq.current.push(newNum);
                const seq = nbackSeq.current;
                const match = seq.length > 2 && seq[seq.length-1] === seq[seq.length-3];
                setNback({ current: newNum, isMatch: match });
            };

            // --- 4. SET ---
            const genSetCards = () => {
                const shapes = ['circle', 'square', 'triangle'];
                const colors = ['#EF4444', '#3B82F6', '#10B981'];
                const newCards = Array.from({length: 9}, (_, i) => ({
                    id: i,
                    shape: shapes[Math.floor(Math.random()*3)],
                    color: colors[Math.floor(Math.random()*3)],
                    fill: Math.random() > 0.5
                }));
                setSetGame({ cards: newCards, selected: [] });
            };

            // --- 通用计时逻辑 ---
            useEffect(() => {
                let timer;
                if (timeLeft > 0 && ['stroop', 'schulte', 'nback', 'setgame'].includes(view)) {
                    timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0 && view !== 'home' && view !== 'result') {
                    setLastScore(score);
                    setView('result');
                }
                return () => clearInterval(timer);
            }, [timeLeft, view, score]);

            const handleGoHome = () => setView('home');

            return (
                <div className="h-full flex flex-col bg-slate-50 text-slate-900 select-none">
                    {/* Top Bar */}
                    {view !== 'home' && (
                        <div className="h-14 px-4 flex justify-between items-center bg-white/80 backdrop-blur-md border-b shrink-0 z-30">
                            <button onClick={handleGoHome} className="p-2 text-slate-400 active:scale-90 transition-transform">
                                <Icon name="home" className="w-5 h-5" />
                            </button>
                            <div className="flex gap-4">
                                <div className="text-center">
                                    <div className="text-[9px] text-slate-400 font-bold uppercase tracking-wider">时间</div>
                                    <div className={`font-mono text-lg font-bold leading-none ${timeLeft < 10 ? 'text-red-500' : ''}`}>{timeLeft}s</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-[9px] text-slate-400 font-bold uppercase tracking-wider">得分</div>
                                    <div className="font-mono text-lg font-bold leading-none text-indigo-600">{score}</div>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 overflow-hidden relative">
                        {/* 首页大厅 */}
                        {view === 'home' && (
                            <div className="p-6 h-full flex flex-col justify-center max-w-md mx-auto space-y-8">
                                <div className="text-center">
                                    <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto shadow-lg shadow-indigo-200 mb-4 animate-pulse-soft">
                                        <Icon name="brain-circuit" className="text-white w-8 h-8" />
                                    </div>
                                    <h1 className="text-2xl font-black text-slate-800">前额叶实验室</h1>
                                    <p className="text-slate-400 text-sm font-medium mt-1">Prefrontal Cortex Training</p>
                                </div>
                                <div className="grid gap-3">
                                    <button onClick={() => startSchulte()} className="flex items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-[0.98] transition-all">
                                        <div className="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center mr-3"><Icon name="grid-3x3" /></div>
                                        <div className="text-left"><div className="font-bold text-sm">舒尔特方格</div><div className="text-[10px] text-slate-400">视觉专注与搜索广度</div></div>
                                    </button>
                                    <button onClick={() => { setView('stroop'); setScore(0); setTimeLeft(30); nextStroop(); }} className="flex items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-[0.98] transition-all">
                                        <div className="w-10 h-10 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center mr-3"><Icon name="zap" /></div>
                                        <div className="text-left"><div className="font-bold text-sm">Stroop 干扰</div><div className="text-[10px] text-slate-400">冲动抑制与执行控制</div></div>
                                    </button>
                                    <button onClick={() => { setView('nback'); setScore(0); setTimeLeft(60); nbackSeq.current=[]; nextNback(); }} className="flex items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-[0.98] transition-all">
                                        <div className="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center mr-3"><Icon name="refresh-cw" /></div>
                                        <div className="text-left"><div className="font-bold text-sm">N-Back (2-Back)</div><div className="text-[10px] text-slate-400">工作记忆动态刷新</div></div>
                                    </button>
                                    <button onClick={() => { setView('setgame'); setScore(0); setTimeLeft(60); genSetCards(); }} className="flex items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm active:scale-[0.98] transition-all">
                                        <div className="w-10 h-10 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center mr-3"><Icon name="box" /></div>
                                        <div className="text-left"><div className="font-bold text-sm">SET 逻辑匹配</div><div className="text-[10px] text-slate-400">逻辑识别与认知灵活性</div></div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 各游戏内容 - 采用简单的条件渲染 */}
                        {view === 'stroop' && (
                            <div className="h-full flex flex-col items-center justify-around p-6">
                                <div className="text-7xl font-black" style={{color: stroop.color}}>{stroop.text}</div>
                                <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
                                    {stroop.opts.map(o => (
                                        <button key={o.val} onClick={() => {
                                            if(o.val === stroop.color) { setScore(s=>s+10); nextStroop(); }
                                            else { setTimeLeft(t=>Math.max(0, t-2)); }
                                        }} className="py-5 bg-white rounded-2xl font-bold shadow-sm border border-slate-100 active:bg-slate-50">
                                            {o.name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'schulte' && (
                            <div className="h-full flex flex-col items-center justify-center p-4">
                                <div className="mb-4 text-center">
                                    <div className="text-xs text-slate-400 uppercase font-bold mb-1 tracking-widest">目标</div>
                                    <div className="text-4xl font-black text-indigo-600">{schulte.next}</div>
                                </div>
                                <div className="grid grid-cols-5 gap-1.5 w-full max-w-sm aspect-square">
                                    {schulte.grid.map(n => (
                                        <button key={n} onClick={() => {
                                            if(n === schulte.next) {
                                                if(n === 25) { setScore(s=>s+200); setLastScore(score+200); setView('result'); }
                                                else { setSchulte(p => ({...p, next: p.next+1})); setScore(s=>s+10); }
                                            }
                                        }} className={`flex items-center justify-center text-lg font-bold rounded-lg transition-all ${n < schulte.next ? 'bg-indigo-600 text-white opacity-30 scale-95' : 'bg-white shadow-sm border border-slate-100'}`}>
                                            {n}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'nback' && (
                            <div className="h-full flex flex-col items-center justify-center p-6 text-center">
                                <div className="text-[10px] text-slate-400 font-bold uppercase mb-4 tracking-[0.2em]">是否与前前个相同?</div>
                                <div className="w-28 h-28 bg-white rounded-[2rem] shadow-inner border-2 border-slate-50 flex items-center justify-center text-5xl font-black text-indigo-600 mb-12">
                                    {nback.current}
                                </div>
                                <div className="flex gap-4 w-full max-w-xs">
                                    <button onClick={() => {
                                        if(nback.isMatch) setScore(s=>s+20); else setTimeLeft(t=>Math.max(0, t-3));
                                        nextNback();
                                    }} className="flex-1 py-6 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95">匹配</button>
                                    <button onClick={() => {
                                        if(!nback.isMatch) setScore(s=>s+5); else setTimeLeft(t=>Math.max(0, t-3));
                                        nextNback();
                                    }} className="flex-1 py-6 bg-slate-100 text-slate-600 rounded-2xl font-black text-lg active:scale-95">不同</button>
                                </div>
                            </div>
                        )}

                        {view === 'setgame' && (
                            <div className="h-full flex flex-col p-6 items-center">
                                <div className="text-xs text-slate-400 font-bold mb-6 tracking-widest text-center uppercase">点击 3 张颜色或形状相同的卡牌</div>
                                <div className="grid grid-cols-3 gap-2 w-full max-w-sm">
                                    {setGame.cards.map(card => (
                                        <button 
                                            key={card.id} 
                                            onClick={() => {
                                                const newSel = setGame.selected.includes(card.id) 
                                                    ? setGame.selected.filter(id => id !== card.id)
                                                    : [...setGame.selected, card.id];
                                                
                                                if(newSel.length === 3) {
                                                    const c1 = setGame.cards[newSel[0]], c2 = setGame.cards[newSel[1]], c3 = setGame.cards[newSel[2]];
                                                    const sameColor = (c1.color === c2.color && c2.color === c3.color);
                                                    const sameShape = (c1.shape === c2.shape && c2.shape === c3.shape);
                                                    if(sameColor || sameShape) { setScore(s=>s+50); genSetCards(); }
                                                    else { setSetGame(p => ({...p, selected: []})); }
                                                } else { setSetGame(p => ({...p, selected: newSel})); }
                                            }}
                                            className={`aspect-square rounded-xl flex items-center justify-center transition-all ${setGame.selected.includes(card.id) ? 'bg-indigo-50 border-2 border-indigo-500 scale-95 shadow-inner' : 'bg-white border border-slate-100 shadow-sm'}`}
                                        >
                                            <div style={{color: card.color}} className={card.fill ? 'opacity-100' : 'opacity-30'}>
                                                <Icon name={card.shape} className="w-8 h-8" />
                                            </div>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={genSetCards} className="mt-8 text-slate-300 font-bold text-[10px] uppercase tracking-widest">刷新卡牌组</button>
                            </div>
                        )}

                        {view === 'result' && (
                            <div className="h-full flex flex-col items-center justify-center p-8 text-center bg-white">
                                <div className="w-20 h-20 bg-amber-50 rounded-full flex items-center justify-center mb-6"><Icon name="trophy" className="w-10 h-10 text-amber-500" /></div>
                                <h2 className="text-2xl font-black text-slate-800">训练完成</h2>
                                <div className="my-8">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">本次表现得分</div>
                                    <div className="text-6xl font-black text-indigo-600 mt-2">{lastScore}</div>
                                </div>
                                <button onClick={handleGoHome} className="w-full max-w-xs py-4 bg-indigo-600 text-white rounded-xl font-bold text-lg shadow-xl shadow-indigo-100 active:scale-95 transition-all">返回大厅</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
