<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>前额叶实验室 - 脑科学训练</title>
    <style>
        body { background-color: #f9fafb; font-family: system-ui, -apple-system, sans-serif; margin: 0; overflow: hidden; }
        #root { height: 100vh; width: 100vw; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .grid-anim { transition: all 0.3s ease; }
        @keyframes flash-green { 0% { background: white; } 50% { background: #dcfce7; } 100% { background: white; } }
        @keyframes flash-red { 0% { background: white; } 50% { background: #fee2e2; } 100% { background: white; } }
        .flash-success { animation: flash-green 0.4s ease; }
        .flash-error { animation: flash-red 0.4s ease; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用特定的 lucide 脚本加载 -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 修复后的通用图标组件 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const [svg, setSvg] = useState('');
            
            useEffect(() => {
                const renderIcon = () => {
                    try {
                        const lucide = window.lucide;
                        if (!lucide) return;
                        
                        // 获取图标对象，处理可能的路径差异
                        const icon = lucide.icons ? lucide.icons[name] : lucide[name];
                        
                        if (icon && typeof icon.toSvg === 'function') {
                            setSvg(icon.toSvg({ class: className }));
                        } else {
                            // 降级方案：如果 toSvg 不可用，尝试用 createIcons 或显示首字母
                            console.warn(`Lucide icon "${name}" toSvg not found`);
                            setSvg(`<span class="text-[10px] font-bold">${name.slice(0,1)}</span>`);
                        }
                    } catch (err) {
                        console.error("Icon render error:", err);
                    }
                };

                // 给脚本一点加载缓冲时间
                if (window.lucide) {
                    renderIcon();
                } else {
                    const timer = setInterval(() => {
                        if (window.lucide) {
                            renderIcon();
                            clearInterval(timer);
                        }
                    }, 100);
                    return () => clearInterval(timer);
                }
            }, [name, className]);

            return <span dangerouslySetInnerHTML={{ __html: svg }} className="flex items-center justify-center" />;
        };

        // --- 核心逻辑组件 ---
        function App() {
            const [view, setView] = useState('home'); 
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            const [lastScore, setLastScore] = useState(0);

            // --- 1. Stroop 逻辑 ---
            const COLORS = [
                { name: '红色', val: '#EF4444' }, { name: '蓝色', val: '#3B82F6' },
                { name: '绿色', val: '#10B981' }, { name: '黄色', val: '#F59E0B' },
                { name: '紫色', val: '#8B5CF6' }
            ];
            const [stroop, setStroop] = useState({ text: '', color: '', opts: [] });
            const nextStroop = () => {
                const t = Math.floor(Math.random()*COLORS.length);
                let c; do { c = Math.floor(Math.random()*COLORS.length); } while(c === t);
                setStroop({ text: COLORS[t].name, color: COLORS[c].val, opts: [...COLORS].sort(()=>Math.random()-0.5) });
            };

            // --- 2. 舒尔特逻辑 ---
            const [schulte, setSchulte] = useState({ grid: [], next: 1 });
            const startSchulte = () => {
                const nums = Array.from({length: 25}, (_, i) => i+1).sort(()=>Math.random()-0.5);
                setSchulte({ grid: nums, next: 1 });
                setView('schulte'); setScore(0); setTimeLeft(60);
            };

            // --- 3. N-Back (2-Back) 逻辑 ---
            const [nback, setNback] = useState({ sequence: [], current: null, isMatch: false, feedback: '' });
            const nbackRef = useRef({ seq: [], index: 0 });
            const nextNback = () => {
                const newNum = Math.floor(Math.random() * 9) + 1;
                nbackRef.current.seq.push(newNum);
                const seq = nbackRef.current.seq;
                const match = seq.length > 2 && seq[seq.length-1] === seq[seq.length-3];
                setNback({ sequence: [...seq], current: newNum, isMatch: match, feedback: '' });
            };

            // --- 4. SET 简化版逻辑 ---
            const [setGame, setSetGame] = useState({ cards: [], selected: [] });
            const genSetCards = () => {
                const shapes = ['Circle', 'Square', 'Triangle'];
                const colors = ['#EF4444', '#3B82F6', '#10B981'];
                const newCards = Array.from({length: 9}, (_, i) => ({
                    id: i,
                    shape: shapes[Math.floor(Math.random()*3)],
                    color: colors[Math.floor(Math.random()*3)],
                    fill: Math.random() > 0.5
                }));
                setSetGame({ cards: newCards, selected: [] });
            };

            // --- 计时器 ---
            useEffect(() => {
                if (timeLeft > 0 && ['stroop', 'schulte', 'nback', 'setgame'].includes(view)) {
                    const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                    return () => clearInterval(timer);
                } else if (timeLeft === 0 && view !== 'home' && view !== 'result') {
                    setLastScore(score);
                    setView('result');
                }
            }, [timeLeft, view]);

            const finishGame = () => { setLastScore(score); setView('result'); };

            return (
                <div className="h-full flex flex-col bg-gray-50 text-gray-900">
                    {view !== 'home' && (
                        <div className="h-16 px-6 flex justify-between items-center bg-white border-b shrink-0 z-20">
                            <button onClick={() => setView('home')} className="p-2 text-gray-400 hover:text-gray-600"><Icon name="X" /></button>
                            <div className="flex gap-6 items-center">
                                <div className="text-right">
                                    <div className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Time</div>
                                    <div className={`font-mono text-xl font-bold ${timeLeft < 10 ? 'text-red-500 animate-pulse' : ''}`}>{timeLeft}s</div>
                                </div>
                                <div className="text-right">
                                    <div className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Score</div>
                                    <div className="font-mono text-xl font-bold text-indigo-600">{score}</div>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 overflow-y-auto no-scrollbar relative">
                        {view === 'home' && (
                            <div className="p-8 max-w-md mx-auto space-y-8 h-full flex flex-col justify-center">
                                <header className="text-center space-y-2">
                                    <div className="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto shadow-xl shadow-indigo-100 mb-4">
                                        <Icon name="BrainCircuit" className="text-white w-10 h-10" />
                                    </div>
                                    <h1 className="text-3xl font-black tracking-tight text-gray-900">前额叶实验室</h1>
                                    <p className="text-gray-400 font-medium">Neuroscience Training Hub</p>
                                </header>
                                
                                <div className="grid grid-cols-1 gap-4">
                                    <button onClick={() => { setView('schulte'); startSchulte(); }} className="flex items-center p-5 bg-white border border-gray-100 rounded-3xl shadow-sm hover:shadow-md transition-all active:scale-95 text-left">
                                        <div className="w-12 h-12 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center mr-4"><Icon name="Grid3X3" /></div>
                                        <div><div className="font-bold">舒尔特方格</div><div className="text-xs text-gray-400">视觉注意力与搜索广度</div></div>
                                    </button>
                                    <button onClick={() => { setView('stroop'); setScore(0); setTimeLeft(30); nextStroop(); }} className="flex items-center p-5 bg-white border border-gray-100 rounded-3xl shadow-sm hover:shadow-md transition-all active:scale-95 text-left">
                                        <div className="w-12 h-12 rounded-2xl bg-orange-50 text-orange-500 flex items-center justify-center mr-4"><Icon name="Zap" /></div>
                                        <div><div className="font-bold">Stroop 干扰</div><div className="text-xs text-gray-400">抑制冲动，强化执行控制</div></div>
                                    </button>
                                    <button onClick={() => { setView('nback'); setScore(0); setTimeLeft(60); nbackRef.current.seq=[]; nextNback(); }} className="flex items-center p-5 bg-white border border-gray-100 rounded-3xl shadow-sm hover:shadow-md transition-all active:scale-95 text-left">
                                        <div className="w-12 h-12 rounded-2xl bg-green-50 text-green-500 flex items-center justify-center mr-4"><Icon name="History" /></div>
                                        <div><div className="font-bold">N-Back (2-Back)</div><div className="text-xs text-gray-400">最具公认的工作记忆训练</div></div>
                                    </button>
                                    <button onClick={() => { setView('setgame'); setScore(0); setTimeLeft(60); genSetCards(); }} className="flex items-center p-5 bg-white border border-gray-100 rounded-3xl shadow-sm hover:shadow-md transition-all active:scale-95 text-left">
                                        <div className="w-12 h-12 rounded-2xl bg-purple-50 text-purple-500 flex items-center justify-center mr-4"><Icon name="Layers" /></div>
                                        <div><div className="font-bold">SET 模式匹配</div><div className="text-xs text-gray-400">逻辑识别与认知灵活性</div></div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'stroop' && (
                            <div className="h-full flex flex-col items-center justify-center p-6 max-w-md mx-auto">
                                <div className="flex-1 flex items-center justify-center text-8xl font-black mb-12 select-none" style={{color: stroop.color}}>
                                    {stroop.text}
                                </div>
                                <div className="grid grid-cols-2 gap-4 w-full pb-8">
                                    {stroop.opts.map(o => (
                                        <button key={o.val} onClick={() => {
                                            if(o.val === stroop.color) { setScore(s=>s+10); nextStroop(); }
                                            else { setTimeLeft(t=>Math.max(0, t-2)); }
                                        }} className="py-6 bg-white border-2 border-gray-100 rounded-3xl font-bold text-xl active:scale-95 active:bg-gray-50 transition-all shadow-sm">
                                            {o.name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'schulte' && (
                            <div className="h-full flex flex-col items-center justify-center p-4 max-w-md mx-auto">
                                <div className="mb-6 text-center">
                                    <div className="text-sm text-gray-400 font-bold uppercase tracking-widest">寻找目标</div>
                                    <div className="text-5xl font-black text-indigo-600 tracking-tighter">{schulte.next}</div>
                                </div>
                                <div className="grid grid-cols-5 gap-2 w-full aspect-square">
                                    {schulte.grid.map(n => (
                                        <button key={n} onClick={() => {
                                            if(n === schulte.next) {
                                                if(n === 25) { setScore(s=>s+200); finishGame(); }
                                                else { setSchulte(p => ({...p, next: p.next+1})); setScore(s=>s+10); }
                                            }
                                        }} className={`flex items-center justify-center text-xl font-bold rounded-2xl transition-all active:scale-90 ${n < schulte.next ? 'bg-indigo-600 text-white opacity-40' : 'bg-white shadow-sm border border-gray-100 text-gray-700'}`}>
                                            {n}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'nback' && (
                            <div className="h-full flex flex-col items-center justify-center p-6 max-w-md mx-auto">
                                <div className="text-center mb-12">
                                    <div className="text-xs text-gray-400 font-bold uppercase tracking-[0.3em] mb-4">当前数字是否与前前个相同?</div>
                                    <div className="w-32 h-32 bg-white rounded-[2.5rem] border-4 border-indigo-50 flex items-center justify-center text-6xl font-black text-indigo-600 shadow-inner">
                                        {nback.current}
                                    </div>
                                </div>
                                <div className="flex gap-4 w-full">
                                    <button onClick={() => {
                                        if(nback.isMatch) { setScore(s=>s+20); setNback(p=>({...p, feedback:'correct'})); }
                                        else { setTimeLeft(t=>Math.max(0,t-3)); setNback(p=>({...p, feedback:'wrong'})); }
                                        nextNback();
                                    }} className="flex-1 py-8 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-lg active:scale-95 transition-all">匹配</button>
                                    <button onClick={() => {
                                        if(!nback.isMatch) { setScore(s=>s+5); }
                                        else { setTimeLeft(t=>Math.max(0,t-3)); }
                                        nextNback();
                                    }} className="flex-1 py-8 bg-gray-100 text-gray-600 rounded-3xl font-black text-xl active:scale-95 transition-all">不同</button>
                                </div>
                                <div className="mt-8 flex gap-2">
                                    {nback.sequence.slice(-5).map((n, i) => (
                                        <div key={i} className="w-3 h-3 rounded-full bg-gray-200"></div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'setgame' && (
                            <div className="h-full flex flex-col p-6 max-w-md mx-auto">
                                <div className="text-center mb-6">
                                    <div className="text-xs text-gray-400 font-bold uppercase tracking-widest">寻找三个相同颜色或形状</div>
                                </div>
                                <div className="grid grid-cols-3 gap-3 flex-1">
                                    {setGame.cards.map(card => (
                                        <button 
                                            key={card.id} 
                                            onClick={() => {
                                                const newSel = setGame.selected.includes(card.id) 
                                                    ? setGame.selected.filter(id => id !== card.id)
                                                    : [...setGame.selected, card.id];
                                                
                                                if(newSel.length === 3) {
                                                    const c1 = setGame.cards[newSel[0]], c2 = setGame.cards[newSel[1]], c3 = setGame.cards[newSel[2]];
                                                    const sameColor = (c1.color === c2.color && c2.color === c3.color);
                                                    const sameShape = (c1.shape === c2.shape && c2.shape === c3.shape);
                                                    if(sameColor || sameShape) { setScore(s=>s+50); genSetCards(); }
                                                    else { setSetGame(p => ({...p, selected: []})); }
                                                } else {
                                                    setSetGame(p => ({...p, selected: newSel}));
                                                }
                                            }}
                                            className={`aspect-square rounded-2xl flex items-center justify-center transition-all border-4 ${setGame.selected.includes(card.id) ? 'border-indigo-500 bg-indigo-50 scale-95 shadow-inner' : 'border-transparent bg-white shadow-sm'}`}
                                        >
                                            <div style={{color: card.color}} className={card.fill ? 'opacity-100' : 'opacity-40'}>
                                                <Icon name={card.shape} className="w-10 h-10" />
                                            </div>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={genSetCards} className="mt-6 py-4 text-gray-400 font-bold text-sm">换一批卡牌</button>
                            </div>
                        )}

                        {view === 'result' && (
                            <div className="h-full flex flex-col items-center justify-center p-8 text-center animate-in fade-in zoom-in duration-500">
                                <div className="w-24 h-24 bg-amber-50 rounded-[2rem] flex items-center justify-center mb-6">
                                    <Icon name="Trophy" className="w-12 h-12 text-amber-500" />
                                </div>
                                <h2 className="text-3xl font-black mb-2">训练完成</h2>
                                <p className="text-gray-400 mb-8 font-medium">前额叶皮层活跃度显著提升</p>
                                <div className="w-full max-w-xs bg-white rounded-[3rem] p-10 shadow-xl shadow-gray-100 border border-gray-50 mb-10">
                                    <div className="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em]">最终表现得分</div>
                                    <div className="text-7xl font-black text-indigo-600 mt-4 tracking-tighter">{lastScore}</div>
                                </div>
                                <button onClick={() => setView('home')} className="w-full max-w-xs py-5 bg-indigo-600 text-white rounded-2xl font-bold text-lg shadow-xl shadow-indigo-100 active:scale-95 transition-all">
                                    回实验室大厅
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
