<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Prefrontal Lab | 前额叶实验室 2.0</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        #root { height: 100vh; width: 100vw; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pop-center { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes flash-red { 0% { background-color: rgba(239, 68, 68, 0.2); } 100% { background-color: transparent; } }
        .animate-pop-center { animation: pop-center 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .arena-flash { animation: flash-red 0.4s ease-out; }
        .brand-text { letter-spacing: 0.15em; text-transform: uppercase; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconEl = document.createElement('i');
                    iconEl.setAttribute('data-lucide', name);
                    iconEl.className = className;
                    iconRef.current.appendChild(iconEl);
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const LatexFmt = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    const raw = text.replace(/\$(.*?)\$/g, (match, p1) => {
                        try { return katex.renderToString(p1, { throwOnError: false }); } catch (e) { return p1; }
                    });
                    containerRef.current.innerHTML = raw;
                }
            }, [text]);
            return <div ref={containerRef} className="inline leading-relaxed" />;
        };

        function App() {
            const [view, setView] = useState('home'); 
            const [mode, setMode] = useState('normal'); 
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            const [lastScore, setLastScore] = useState(0);
            const [isError, setIsError] = useState(false);
            const [showInfo, setShowInfo] = useState(null); 
            
            // --- 数据迁移逻辑：确保 1.0 数据同步到 2.0 ---
            const [history, setHistory] = useState(() => {
                const v1DataRaw = localStorage.getItem('brain_train_pro_data');
                const v2DataRaw = localStorage.getItem('brain_train_pro_v5');
                
                let base = { bestScore: 0, bestCompScore: 0, isHardUnlocked: false };
                
                // 如果有 2.0 数据，直接用
                if (v2DataRaw) return JSON.parse(v2DataRaw);
                
                // 如果没有 2.0 但有 1.0 数据，进行搬运
                if (v1DataRaw) {
                    const v1 = JSON.parse(v1DataRaw);
                    base.bestScore = v1.bestScore || 0;
                    base.isHardUnlocked = v1.isHardUnlocked || false;
                }
                return base;
            });

            const TASK_DATA = {
                schulte: { 
                    title: "舒尔特方格", en: "Schulte Grid", icon: "grid-3x3", color: "text-blue-500", time: 60, 
                    homeBasic: "视觉搜索广度", homeHard: "盲点模式 (不显示已选)",
                    guide: { goal: "专注力与视觉搜索", play: "按 $1, 2, 3 \\dots$ 顺序尽快点完所有数字。", effect: "飞行员常用训练法，扩大视野广度。" }
                },
                stroop: { 
                    title: "Stroop 干扰", en: "Stroop Task", icon: "palette", color: "text-red-500", time: 60, 
                    homeBasic: "颜色直觉反应", homeHard: "文字识别加工",
                    guide: { goal: "抑制冲动与反应抑制", play: "忽略文字字义，只根据字体的“颜色”做出反应。", effect: "减少“手滑”错误，训练冲突处理。" }
                },
                nback: { 
                    title: "N-Back 记忆", en: "Dual N-Back", icon: "brain", color: "text-purple-500", time: 60, 
                    homeBasic: "工作记忆比对", homeHard: "仅 2-Back 计分",
                    guide: { goal: "工作记忆 (Working Memory)", play: "判断当前项与倒数第 $N$ 个是否相同。", effect: "最有效的大脑扩容训练。" }
                },
                setgame: { 
                    title: "SET 逻辑", en: "Set Logic", icon: "shapes", color: "text-green-500", time: 60, 
                    homeBasic: "逻辑处理", homeHard: "进阶图形匹配",
                    guide: { goal: "模式识别与逻辑推理", play: "寻找满足颜色或形状逻辑的组合。", effect: "考验空间逻辑和发散性思维。" }
                },
            };

            const [schulte, setSchulte] = useState({ grid: [], next: 1 });
            const [stroop, setStroop] = useState({ text: '', color: '', opts: [] });
            const [nback, setNback] = useState({ current: null, isMatch: false });
            const [setGame, setSetGame] = useState({ cards: [], selected: [] });
            const nbackSeq = useRef([]);

            const getFeedback = (s) => {
                if (s <= 0) return { label: "实验室新人", sub: "别灰心，大脑正在热身！", color: "text-slate-400" };
                if (s < 200) return { label: "初露锋芒", sub: "神经元开始活跃，继续保持。", color: "text-blue-500" };
                if (s < 500) return { label: "脑力达人", sub: "专注力已经超过了 70% 的人！", color: "text-indigo-600" };
                if (s < 800) return { label: "认知巅峰", sub: "极速反应！你的大脑放电非常快。", color: "text-purple-600" };
                return { label: "前额叶战神", sub: "你的大脑结构可能异于常人！", color: "text-amber-600" };
            };

            const initGameCore = (type) => {
                const isHard = mode === 'hard' || mode === 'comp';
                if(type === 'schulte') {
                    const nums = Array.from({length: 25}, (_, i) => i+1).sort(()=>Math.random()-0.5);
                    setSchulte({ grid: nums, next: 1 });
                } else if(type === 'stroop') {
                    const colors = [{name:'红',val:'#EF4444'},{name:'蓝',val:'#3B82F6'},{name:'绿',val:'#10B981'},{name:'黄',val:'#F59E0B'}];
                    const t = Math.floor(Math.random()*4);
                    let c; do { c = Math.floor(Math.random()*4); } while(c === t);
                    setStroop({ text: colors[t].name, color: colors[c].val, opts: [...colors].sort(()=>Math.random()-0.5) });
                } else if(type === 'nback') {
                    const num = Math.floor(Math.random()*9)+1;
                    nbackSeq.current.push(num);
                    const match = nbackSeq.current.length > 2 && nbackSeq.current[nbackSeq.current.length-1] === nbackSeq.current[nbackSeq.current.length-3];
                    setNback({ current: num, isMatch: match });
                } else if(type === 'setgame') {
                    const shapes = ['circle', 'square', 'triangle'], colors = ['#EF4444', '#3B82F6', '#10B981'];
                    setSetGame({ cards: Array.from({length: 9}, (_, i) => ({ id: i, shape: shapes[Math.floor(Math.random() * 3)], color: colors[Math.floor(Math.random() * 3)], fill: isHard ? Math.random() > 0.5 : true })), selected: [] });
                }
            };

            const switchArenaTask = () => {
                const tasks = ['schulte', 'stroop', 'setgame'];
                const next = tasks[Math.floor(Math.random() * tasks.length)];
                initGameCore(next);
                setView(next);
            };

            const startChallenge = (type) => {
                setScore(0); 
                nbackSeq.current = [];
                if (mode === 'comp') {
                    setTimeLeft(90); 
                    switchArenaTask();
                } else {
                    setTimeLeft(TASK_DATA[type].time);
                    initGameCore(type);
                    setView(type);
                }
            };

            const handleArenaError = () => {
                setIsError(true);
                setTimeout(() => setIsError(false), 400);
                if (mode === 'comp') setTimeLeft(prev => Math.max(0, prev - 5));
            };

            const endGame = (finalScoreOverride) => {
                const currentFinalScore = typeof finalScoreOverride === 'number' ? finalScoreOverride : score;
                setLastScore(currentFinalScore);
                const isComp = mode === 'comp';
                const newHist = { 
                    ...history,
                    bestScore: isComp ? history.bestScore : Math.max(history.bestScore, currentFinalScore),
                    bestCompScore: isComp ? Math.max(history.bestCompScore || 0, currentFinalScore) : (history.bestCompScore || 0),
                    isHardUnlocked: (history.bestScore >= 500 || currentFinalScore >= 500 || history.isHardUnlocked)
                };
                setHistory(newHist);
                localStorage.setItem('brain_train_pro_v5', JSON.stringify(newHist));
                setView('result'); 
                setTimeLeft(0);
            };

            useEffect(() => {
                let timer;
                if (!['home', 'result'].includes(view) && timeLeft > 0) {
                    timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0 && !['home', 'result'].includes(view)) {
                    endGame();
                }
                return () => clearInterval(timer);
            }, [timeLeft, view]);

            return (
                <div className={`h-full flex flex-col transition-colors duration-200 ${isError ? 'arena-flash' : 'bg-slate-50'} text-slate-900 select-none`}>
                    
                    {view === 'home' && (
                        <div className="p-6 pt-10 flex flex-col items-center h-full overflow-y-auto no-scrollbar">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 text-white rounded-2xl mb-4 shadow-xl"><Icon name="brain-circuit" /></div>
                                <h1 className="text-2xl font-black text-slate-800 mb-0.5">前额叶实验室 2.0</h1>
                                <div className="text-[10px] font-bold text-slate-400 brand-text">Prefrontal Lab</div>
                            </div>
                            
                            <div className={`w-full max-w-sm p-6 rounded-[2.2rem] text-white mb-6 shadow-lg flex justify-between items-end relative overflow-hidden ${mode === 'comp' ? 'bg-amber-500' : 'bg-indigo-600'}`}>
                                <div className="z-10">
                                    <div className="text-[10px] opacity-60 font-bold uppercase tracking-widest">历史最高 (已同步)</div>
                                    <div className="text-4xl font-black">{mode === 'comp' ? (history.bestCompScore || 0) : (history.bestScore || 0)}</div>
                                </div>
                                <div className="z-10 text-[10px] font-bold bg-black/20 px-3 py-1.5 rounded-full backdrop-blur-md">
                                    {history.isHardUnlocked ? "🔓 Advanced On" : "🔒 500 Unlock"}
                                </div>
                                <div className="absolute top-[-20px] right-[-20px] opacity-10 rotate-12"><Icon name="brain" className="w-32 h-32" /></div>
                            </div>

                            <div className="flex w-full max-w-sm bg-slate-200 p-1 rounded-2xl mb-8">
                                {['normal', 'hard', 'comp'].map(m => (
                                    <button key={m} onClick={() => setMode(m)} className={`flex-1 py-3 rounded-xl text-[10px] font-bold transition-all ${mode === m ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>{m === 'normal' ? '基础' : m === 'hard' ? '进阶' : '竞技'}</button>
                                ))}
                            </div>

                            <div className="w-full max-w-sm mb-12">
                                {mode === 'comp' ? (
                                    <div onClick={() => startChallenge()} className="flex items-center p-5 bg-white rounded-[1.8rem] border-2 border-amber-100 shadow-md active:scale-[0.98] transition-transform cursor-pointer">
                                        <div className="w-12 h-12 rounded-xl flex items-center justify-center mr-4 bg-amber-50 text-amber-500">
                                            <Icon name="zap" className="w-7 h-7" />
                                        </div>
                                        <div className="flex-1">
                                            <div className="font-bold text-lg text-slate-800">全能认知竞技场</div>
                                            <div className="text-[11px] text-slate-500 font-medium">混合：Schulte + Stroop + SET</div>
                                        </div>
                                        <Icon name="swords" className="w-5 h-5 text-amber-300" />
                                    </div>
                                ) : (
                                    <div className="grid gap-3">
                                        {Object.keys(TASK_DATA).map(type => (
                                            <div key={type} className="flex items-center p-5 bg-white rounded-[1.8rem] border border-slate-100 shadow-sm active:scale-[0.98] transition-transform">
                                                <div onClick={() => startChallenge(type)} className="flex items-center flex-1 cursor-pointer">
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center mr-4 bg-slate-50 ${TASK_DATA[type].color}`}>
                                                        <Icon name={TASK_DATA[type].icon} />
                                                    </div>
                                                    <div>
                                                        <div className="font-bold text-base text-slate-800">{TASK_DATA[type].title}</div>
                                                        <div className="text-[11px] text-slate-500 font-medium">{mode === 'normal' ? TASK_DATA[type].homeBasic : TASK_DATA[type].homeHard}</div>
                                                    </div>
                                                </div>
                                                <button onClick={() => setShowInfo(type)} className="p-2 ml-2 text-slate-300"><Icon name="info" className="w-5 h-5" /></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {showInfo && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 backdrop-blur-md bg-slate-900/40" onClick={() => setShowInfo(null)}>
                            <div className="bg-white w-full max-w-xs rounded-[2.8rem] p-8 relative animate-pop-center" onClick={e => e.stopPropagation()}>
                                <div className={`w-14 h-14 rounded-2xl bg-slate-50 flex items-center justify-center mb-6 ${TASK_DATA[showInfo].color}`}><Icon name={TASK_DATA[showInfo].icon} className="w-7 h-7" /></div>
                                <h2 className="text-xl font-black mb-1">{TASK_DATA[showInfo].title}</h2>
                                <div className="text-[9px] font-bold text-slate-400 brand-text mb-6">{TASK_DATA[showInfo].en}</div>
                                <div className="text-xs text-slate-600 leading-relaxed font-medium mb-8"><LatexFmt text={TASK_DATA[showInfo].guide.play} /></div>
                                <button onClick={() => { startChallenge(showInfo); setShowInfo(null); }} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">开始训练</button>
                            </div>
                        </div>
                    )}

                    {!['home', 'result'].includes(view) && (
                        <div className="flex-1 flex flex-col">
                            <div className="h-14 px-4 flex justify-between items-center bg-white border-b border-slate-100">
                                <button onClick={() => setView('home')} className="p-2 text-slate-400"><Icon name="chevron-left" /></button>
                                <div className="text-center">
                                    <div className="text-[9px] font-black text-indigo-500 brand-text">{mode === 'comp' ? 'ARENA MODE' : 'TRAINING'}</div>
                                    <div className="text-sm font-bold">{mode === 'comp' ? '全能竞技' : TASK_DATA[view]?.title}</div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className={`text-xs font-mono font-bold px-2 py-1 rounded ${isError ? 'bg-red-500 text-white' : 'bg-slate-100'}`}>{timeLeft}s</div>
                                    <div className="font-mono text-xl font-black text-indigo-600">{score}</div>
                                </div>
                            </div>
                            <div className="flex-1 flex items-center justify-center p-6">
                                {view === 'schulte' && (
                                    <div className="grid grid-cols-5 gap-1.5 w-full max-w-sm aspect-square">
                                      {schulte.grid.map(n => {
    // 核心逻辑：判断当前格子的状态
    const isClicked = n < schulte.next; // 是否已经点过了
    const isHardMode = mode === 'hard' || mode === 'comp'; // 是否是进阶或竞技模式

    return (
        <button 
            key={n} 
            onClick={() => {
                // 只有点击“下一个正确数字”时才触发逻辑
                if(n === schulte.next) {
                    if(n === 25) { 
                        const finalScore = score + 10 + (timeLeft * 10);
                        setScore(finalScore);
                        mode === 'comp' ? switchArenaTask() : endGame(finalScore);
                    } else { 
                        setSchulte(p => ({...p, next: p.next + 1})); 
                        setScore(s => s + 10); 
                    }
                } else {
                    handleArenaError(); // 点错了闪红光
                }
            }} 
           className={`flex items-center justify-center font-bold text-lg rounded-lg border transition-all 
    ${(n < schulte.next && mode === 'hard') // ← 这里去掉了 mode === 'comp'
        ? 'bg-white text-slate-900 border-slate-100 shadow-sm' // 只有进阶模式是“盲点”
        : (n < schulte.next 
            ? 'bg-indigo-600 text-white opacity-20 border-transparent' // 竞技和基础模式：点过变蓝透明
            : 'bg-white text-slate-900 border-slate-100 shadow-sm'
        )
    }`}
        >
            {n}
        </button>
    );
})}
                                    </div>
                                )}
                                {view === 'stroop' && (
                                    <div className="flex flex-col items-center space-y-12 w-full">
                                        <div className="text-7xl font-black" style={{color: stroop.color}}>{stroop.text}</div>
                                        <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
                                            {stroop.opts.map(o => (
                                                <button key={o.val} onClick={() => {
                                                    if(o.val === stroop.color) { setScore(s=>s+30); mode === 'comp' ? switchArenaTask() : initGameCore('stroop'); } 
                                                    else handleArenaError();
                                                }} className="py-6 bg-white rounded-2xl border border-slate-100 font-bold shadow-sm">{mode === 'normal' ? <div className="w-8 h-8 rounded-full mx-auto" style={{backgroundColor:o.val}}></div> : o.name}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {view === 'nback' && (
                                    <div className="flex flex-col items-center w-full">
                                        <div className="w-24 h-24 bg-white rounded-3xl shadow-xl flex items-center justify-center text-4xl font-black text-indigo-600 mb-12 border border-slate-100">{nback.current}</div>
                                        <div className="grid grid-cols-2 gap-4 w-full max-w-xs">
                                            <button onClick={() => {
                                                if(nback.isMatch) { setScore(s=>s+50); mode === 'comp' ? switchArenaTask() : initGameCore('nback'); }
                                                else handleArenaError();
                                            }} className="py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">匹配</button>
                                            <button onClick={() => {
                                                if(!nback.isMatch) { setScore(s=>s+20); mode === 'comp' ? switchArenaTask() : initGameCore('nback'); }
                                                else handleArenaError();
                                            }} className="py-5 bg-slate-200 text-slate-600 rounded-2xl font-bold">不同</button>
                                        </div>
                                    </div>
                                )}
                                {view === 'setgame' && (
                                    <div className="grid grid-cols-3 gap-2 w-full max-w-sm">
                                        {setGame.cards.map(card => (
                                            <button key={card.id} onClick={() => {
                                                const newSel = setGame.selected.includes(card.id) ? setGame.selected.filter(id => id !== card.id) : [...setGame.selected, card.id];
                                                if(newSel.length === 3) {
                                                    const [c1, c2, c3] = newSel.map(id => setGame.cards.find(c => c.id === id));
                                                    const match = (c1.color===c2.color && c2.color===c3.color) || (c1.shape!==c2.shape && c2.shape!==c3.shape && c1.shape!==c3.shape);
                                                    if(match) { setScore(s=>s+100); mode === 'comp' ? switchArenaTask() : initGameCore('setgame'); }
                                                    else { handleArenaError(); setSetGame(p=>({...p, selected: []})); }
                                                } else setSetGame(p=>({...p, selected: newSel}));
                                            }} className={`aspect-square rounded-2xl border-2 flex items-center justify-center transition-all ${setGame.selected.includes(card.id) ? 'border-indigo-500 bg-indigo-50' : 'border-slate-100 bg-white'}`}>
                                                <div style={{color: card.color}} className={card.fill ? 'opacity-100' : 'opacity-30'}><Icon name={card.shape} className="w-10 h-10" /></div>
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {view === 'result' && (() => {
                        const feedback = getFeedback(lastScore);
                        return (
                            <div className="flex-1 flex flex-col items-center justify-center px-8 text-center animate-pop-center">
                                <div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mb-6 text-indigo-500 shadow-sm"><Icon name="sparkles" className="w-10 h-10" /></div>
                                <div className="text-[10px] font-black brand-text text-slate-400 mb-1">测试结束 - 最终得分</div>
                                <div className="text-6xl font-black text-indigo-600 mb-6 font-mono">{lastScore}</div>
                                <div className={`text-xl font-black mb-1 ${feedback.color}`}>{feedback.label}</div>
                                <div className="text-xs text-slate-500 mb-12 font-medium leading-relaxed max-w-[200px]">{feedback.sub}</div>
                                <button onClick={() => setView('home')} className="w-full max-w-sm py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-lg">返回大厅</button>
                            </div>
                        );
                    })()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
